name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level; the deploy job escalates for itself.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    # Gate: data must be regression-free before it can ship. Astro treats
    # public/**/*.json as static assets, so semantically corrupt data (unit
    # errors, cross-state contamination, column shifts) builds cleanly and
    # would deploy. This is the only step that inspects the data itself.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate SLBC data against baseline
        # Fails only on NEW critical issues (counts rising above the accepted
        # baseline), so pre-existing debt doesn't block deploys while a bad
        # extraction is caught. Triage a new finding, then either fix it or
        # regenerate the baseline with --write-baseline.
        run: python3 validate_data.py --baseline .github/validation-baseline.json

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Deploy is the only job that needs Pages + OIDC credentials.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
