<?xml version="1.0" encoding="UTF-8"?>
<!--
  FINER · Atlas Open Graph card (1200×630)

  Layout:
    Row 1: brand mark + wordmark        | top-right meta
    Row 2: headline (one line, fits)
    Row 3: stat block — N indicators / 800+ districts / 25 states
    Row 4: tagline                       | projectfiner.com

  Regenerate the PNG from this SVG with:
    python3 scripts/build_og_image.py
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Fraunces', Georgia, serif">
  <defs>
    <linearGradient id="hairline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#B84A2E"/>
      <stop offset="100%" stop-color="#D4A24A"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,300..600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
      .body  { font-family: 'Source Serif 4', Georgia, serif; }
      .mono  { font-family: 'IBM Plex Mono', monospace; }
      .ink   { fill: #1B140E; }
      .ink-soft { fill: #3D332A; }
      .mist  { fill: #6E665E; }
      .verm  { fill: #B84A2E; }
      .verm-d{ fill: #8E331E; }
      .saffron { fill: #D4A24A; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#F4EFE6"/>
  <rect x="0" y="0" width="1200" height="12" fill="url(#hairline)"/>

  <!-- Brand block: four-bar mark + FINER. -->
  <g transform="translate(80, 70)">
    <g transform="scale(3.6)">
      <rect x="0" y="2"  width="7"  height="3" fill="#B84A2E"/>
      <rect x="0" y="7"  width="11" height="3" fill="#1B140E"/>
      <rect x="0" y="12" width="18" height="3" fill="#1B140E"/>
      <rect x="0" y="17" width="9"  height="3" fill="#D4A24A"/>
    </g>
    <text x="84" y="64" font-size="54" font-weight="400" letter-spacing="-1.2" class="ink">FINER<tspan class="verm">.</tspan></text>
  </g>

  <!-- Top-right meta -->
  <g class="mono" font-size="16" text-anchor="end">
    <text x="1120" y="86"  class="mist">ATLAS · INDIA</text>
    <text x="1120" y="108" class="mist">EST. 2024</text>
  </g>

  <!-- Headline: smaller font, one line.
       Total at 56px Fraunces is ≈980px wide — fits inside the 1040px text area. -->
  <text x="80" y="290" font-size="56" font-weight="400" letter-spacing="-1.6">
    <tspan class="ink">An atlas of </tspan>
    <tspan class="verm" font-style="italic" font-weight="320">financial inclusion</tspan>
    <tspan class="ink"> in India.</tspan>
  </text>

  <!-- Subhead, in italic Source Serif -->
  <text x="80" y="345" class="body mist" font-size="24" font-style="italic">district by district, quarter by quarter</text>

  <line x1="80" y1="395" x2="1120" y2="395" stroke="#D9D2C5" stroke-width="1"/>

  <!-- Stat block, three columns equally spaced.
       Numbers sit on the same baseline (y=510). Labels are aligned bottom
       relative to the number's cap-height (y=498). -->
  <g transform="translate(80, 510)">
    <text x="0"    y="0" font-size="72" font-weight="380" letter-spacing="-1.8" class="verm-d">25</text>
    <text x="84"   y="-8" font-size="22" font-weight="300" class="mist">indicators</text>

    <text x="380"  y="0" font-size="72" font-weight="380" letter-spacing="-1.8" class="ink-soft">800+</text>
    <text x="554"  y="-8" font-size="22" font-weight="300" class="mist">districts</text>

    <text x="760"  y="0" font-size="72" font-weight="380" letter-spacing="-1.8" class="ink-soft">25</text>
    <text x="844"  y="-8" font-size="22" font-weight="300" class="mist">states</text>
  </g>

  <!-- Bottom row: tag + url -->
  <text x="80"   y="588" class="body mist" font-size="20">PhonePe · RBI · SLBC · UIDAI · NFHS · SHRUG · SRTM</text>
  <text x="1120" y="588" class="body ink" font-size="22" text-anchor="end">projectfiner.com</text>
</svg>
